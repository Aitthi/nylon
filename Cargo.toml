[package]
name = "nylon"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version="2.11.2", features = [
  "napi8",
  "serde-json",
  "tokio_rt"
] }
napi-derive = { version="2.11.0", features = ["type-def"] }
hyper = { version="0.14.24", features = ["full"] }
serde_derive = "1.0.152"
serde_json = "1.0.93"
tokio = { version = "1.25.0", features = ["full"] }
tower = { version="0.4.13", features = ["make", "util"] }
tower-http = { version="0.3.5", features = ["add-extension", "trace"] }
tracing = "0.1.37"
tracing-subscriber = "0.3.16"
jemallocator = "0.5.0"
ahash = "0.8.3"
matchit = "0.7.0"
futures-util = "0.3.26"

[build-dependencies]
napi-build = "2.0.1"

[dev-dependencies]
trybuild = "1.0.77"

[profile.release]
lto = 'fat'
opt-level = 3
overflow-checks = true
panic = "abort"
